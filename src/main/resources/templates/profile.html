<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Perfil</title>
  <link href="//netdna.bootstrapcdn.com/bootstrap/3.2.0/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
  <script src="//code.jquery.com/jquery-1.11.1.min.js"></script>
  <script src="//netdna.bootstrapcdn.com/bootstrap/3.2.0/js/bootstrap.min.js"></script>
</head>
<body> 
	<div class="container" th:if="${Color}">
	    <div class="page-header">
	        <h1>Tabla de color 1<span class="pull-right label label-default">:)</span></h1>
	    </div>
	    <div class="row">
	    	<div class="col-md-6">
	            <div class="panel with-nav-tabs panel-danger">
	                <div class="panel-heading">
	                        <ul class="nav nav-tabs">
	                            <li class="active"><a href="#tab1default" data-toggle="tab">Nombre</a></li>
	                            <li><a href="#tab2default" data-toggle="tab">Email</a></li>
	                            <li><a href="#tab3default" data-toggle="tab">Carrera</a></li>
	                            <li class="dropdown">
	                                <a href="#" data-toggle="dropdown">Más <span class="caret"></span></a>
	                                <ul class="dropdown-menu" role="menu">
	                                    <li><a href="#tab4default" data-toggle="tab">Default 4</a></li>
	                                    <li><a href="#tab5default" data-toggle="tab">Default 5</a></li>
	                                </ul>
	                            </li>
	                        </ul>
	                </div>
	                <div class="panel-body">
	                    <div class="tab-content">
	                        <div class="tab-pane fade in active" id="tab1default"th:text="${user.name}"></div>
	                        <div class="tab-pane fade" id="tab2default" th:text="${user.email}"></div>
	                        <div class="tab-pane fade" id="tab3default" th:text="${user.carrera}"></div>
	                        <div class="tab-pane fade" id="tab4default">Default 4</div>
	                        <div class="tab-pane fade" id="tab5default">Default 5</div>
	                    </div>
	                </div>
	            </div>
	     	</div>
			</div>
			</div>
			<div class="container" th:unless="${Color}">
				<div class="page-header">
					        <h1>Tabla de color 2<span class="pull-right label label-default">:)</span></h1>
					    </div>
			<div class="col-md-6">
			            <div class="panel with-nav-tabs panel-info">
							<div class="panel-heading">
			                        <ul class="nav nav-tabs">

			                        <div class="tab-pane fade" id="tab3default" th:text="${user.carrera}"></div>
			                        <div class="tab-pane fade" id="tab4default">Default 4</div>
